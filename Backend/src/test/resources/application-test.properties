# ===============================================
# CONFIGURACAO DE TESTES - Banco H2 em memoria
# A05: O H2 DEVE ser utilizado APENAS neste perfil.
# Em producao, o MySQL e configurado via application.properties.
# Para ativar: @ActiveProfiles("test") nas classes de teste, ou
# inicie com: --spring.profiles.active=test
# ===============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console habilitado apenas em testes
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT para testes (32 bytes em Base64 = 256 bits)
orcana.jwt.secret=dGVzdGUtc2VjcmV0LWNoYXZlLTMyLWJ5dGVzLTAwMQ==
orcana.jwt.validity=3600


