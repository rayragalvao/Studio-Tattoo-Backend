name: CI/CD - Backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
    types: [opened, reopened, synchronize]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build com Maven
        run: mvn clean package -DskipTests -Dmaven.test.skip=true

  deploy:
    name: Build Docker & Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -Dmaven.test.skip=true

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/orcana-backend:latest

      - name: Deploy no backend-01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REVPRO_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/orcana-key.pem ubuntu@${{ secrets.BACKEND_01_IP }} "
              docker-compose pull &&
              docker-compose up -d
            "

      - name: Deploy no backend-02
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REVPRO_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/orcana-key.pem ubuntu@${{ secrets.BACKEND_02_IP }} "
              docker-compose pull &&
              docker-compose up -d
            "
